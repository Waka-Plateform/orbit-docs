name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name crorbitplatform

      - name: Build & push
        run: |
          IMAGE=crorbitplatform.azurecr.io/orbit-docs:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Update Container App
        run: |
          az containerapp update \
            --name orbit-docs \
            --resource-group rg-orbit-platform \
            --image $IMAGE

      - name: Smoke test
        run: |
          FQDN=$(az containerapp show -n orbit-docs -g rg-orbit-platform --query properties.configuration.ingress.fqdn -o tsv)
          for i in 1 2 3 4 5; do
            if curl -fsS https://$FQDN/health; then exit 0; fi
            sleep 10
          done
          echo "Health check failed"
          exit 1
